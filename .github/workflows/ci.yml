name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright cloudsync
      - run: uv run pytest --cov=cloudsync.sync --cov=cloudsync.state --cov=cloudsync.scanner --cov-report=term-missing
      - run: uv build
      - run: uv run --isolated --with dist/*.whl cloudsync --help
