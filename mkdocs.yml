site_name: cloudsync
site_description: A deliberate one-way sync from local directories to cloud storage.
site_url: https://minlee0210.github.io/cloudsync/
repo_url: https://github.com/MinLee0210/cloudsync
repo_name: MinLee0210/cloudsync

theme:
  name: material
  language: en
  favicon: null
  logo: null
  font: false
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist

nav:
  - Start here: index.md
  - Guides:
      - Installation: guides/installation.md
      - Sync model: guides/sync-model.md
      - Google Drive: guides/google-drive.md
      - S3 and MinIO: guides/s3-minio.md
  - Reference:
      - CLI: reference/cli.md
      - Python API: reference/python-api.md
      - Providers: reference/providers.md
  - Contributing: contributing.md
